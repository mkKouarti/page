name: Rebuild site

# Runs when a source file changes, never when only generated HTML changes.
# The generated pages get committed back to main, which is what Pages serves.
on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'assets/**'
      - 'site.config.json'
      - 'build.py'
      - 'check.py'
      - '.github/workflows/rebuild.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rebuild-site
  cancel-in-progress: true

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build
        run: python3 build.py

      - name: Check
        run: python3 check.py

      - name: Commit the build
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "the build matches what is already committed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Rebuild site from ${GITHUB_SHA::7}"
          git push
